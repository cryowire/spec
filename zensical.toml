[project]
site_name = "cryowire-spec"
site_description = "Specification for dilution refrigerator wiring configuration data"
site_url = "https://cryowire.github.io/spec/"
nav = [
  {"Home" = "index.md"},
  {"Guide" = [
    "guide/directory-structure.md",
    "guide/temperature-stages.md",
    "guide/component-types.md",
    "guide/line-configuration.md",
    "guide/examples.md",
  ]},
  {"Schema Reference" = [
    "reference/wiring-schema.md",
    "reference/components-schema.md",
    "reference/metadata-schema.md",
    "reference/chip-schema.md",
  ]},
]
extra_css = ["stylesheets/extra.css"]

[project.theme]
favicon = "assets/logo.png"
logo = "assets/logo.png"

[project.theme.font]
text = "Inter"
code = "JetBrains Mono"

[[project.theme.palette]]
scheme = "slate"
primary = "light-blue"
accent = "indigo"
toggle.icon = "lucide/sun"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
scheme = "default"
primary = "light-blue"
accent = "indigo"
toggle.icon = "lucide/moon"
toggle.name = "Switch to dark mode"
